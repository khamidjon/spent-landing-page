# Feature List                            The 3-second pitch (capture) + understand + private, pulled from LANDING_CONTEXT.md §2–§3.
features                                   :

  - title                                 : Snap a receipt
    description                           : Point your camera and Spent's AI reads the merchant, total, date, category and line items, then pre-fills the entry. No typing.
    fontawesome_icon_name                 : camera

  - title                                 : Just say it
    description                           : Speak naturally — "Coffee, 45 thousand" — and Spent turns it into a clean, categorised transaction.
    fontawesome_icon_name                 : microphone

  - title                                 : Or type it
    description                           : Prefer to tap? A fast type-over-placeholder manual entry gets a spend logged in seconds.
    fontawesome_icon_name                 : keyboard

  - title                                 : See where it goes
    description                           : A one-screen home with a hero total, category chart and day-grouped list, plus an Insights donut with period-over-period trends.
    fontawesome_icon_name                 : chart-pie

  - title                                 : Budgets that nudge
    description                           : Set per-category budgets and get subtle progress meters with gentle nudges before you overspend.
    fontawesome_icon_name                 : bullseye

  - title                                 : Any currency
    description                           : Full multi-currency support with automatic exchange-rate conversion to your base currency, and precise decimal money.
    fontawesome_icon_name                 : globe

  - title                                 : Private & offline
    description                           : Local-first storage means Spent works fully offline and syncs privately. No sign-in wall to get started.
    fontawesome_icon_name                 : lock

  - title                                 : Made for families
    description                           : Shared lists and a Family plan keep a household in sync — Personal, Family and Business lists are a tap apart.
    fontawesome_icon_name                 : users



